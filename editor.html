<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>cracks generator — editor</title>
<style>
@font-face{font-family:'TT Gertika';src:url('fonts/TT_Gertika_Educational_Variable.ttf') format('truetype');font-weight:100 900}
@font-face{font-family:'TT Interphases Condensed';src:url('fonts/TT_Interphases_Pro_Educational_Condensed_DemiBold.ttf') format('truetype');font-weight:600}
@font-face{font-family:'TT Commons Pro';src:url('fonts/TT_Commons_Pro_VF_Educational.ttf') format('truetype');font-weight:100 900}

*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0a0a0a;--muted:#888;--border:#111;--accent:#cc2200}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:'TT Commons Pro',sans-serif;color:#111}
button,input{font-family:inherit}
#app{display:flex;flex-direction:column;width:100%;height:100%}

/* ───────── TOPBAR ───────── */
#topbar{
  height:104px;flex-shrink:0;display:flex;align-items:center;
  border-bottom:3px solid var(--border);z-index:50;padding:0 22px;gap:16px;background:#fff;
}
#logo-mark{height:58px;flex-shrink:0;overflow:visible}
#headline{display:flex;align-items:center;gap:8px;flex-shrink:0}
#headline .h1{font-family:'TT Gertika',sans-serif;font-weight:800;font-size:46px;line-height:1;letter-spacing:-.01em}
#headline .squiggle{width:32px;height:28px;flex-shrink:0}
#headline .h2{font-family:'TT Gertika',sans-serif;font-weight:400;font-size:25px;color:#222}
#altHint{margin-left:auto;font-size:11px;color:#333;flex-shrink:0}
.tsave{display:flex;align-items:center;gap:8px;flex-shrink:0}
#saveName{background:#fff;border:2px solid var(--border);font-size:12px;color:#111;
  padding:7px 10px;width:170px;outline:none}
#saveName::placeholder{color:#999}
.sbtn{border:2px solid var(--border);padding:8px 16px;font-size:12px;
  cursor:pointer;transition:opacity .12s;white-space:nowrap;font-weight:600;
  font-family:'TT Interphases Condensed',sans-serif}
.sbtn.p{background:var(--ink);color:#fff}
.sbtn.s{background:#fff;color:#111}
.sbtn:hover{opacity:.72}

/* ───────── MAIN ───────── */
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* ───────── LEFT: back-link + toolbar ───────── */
#leftcol{width:108px;flex-shrink:0;border-right:3px solid var(--border);
  display:flex;flex-direction:column;align-items:center;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;padding:34px 0 14px}
#leftcol::-webkit-scrollbar{display:none}
#backlink{display:block;width:92px;margin:14px 0 16px;text-decoration:none;position:relative}
#backlink svg{width:100%;display:block}
#backlink .bl-label{
  font-family:'TT Interphases Condensed',sans-serif;font-weight:600;font-size:11px;
  color:#111;line-height:1.15;position:absolute;top:-20px;left:-6px;width:120px;
}
#toolbar{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
.tbtn{width:46px;height:46px;border:2px solid var(--border);
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .1s;position:relative;flex-shrink:0}
.tbtn:hover{background:#f1f1f1}
.tbtn.on{background:var(--ink);border-color:var(--ink)}
.tbtn.on .icon-s{stroke:#fff!important}
.tbtn.on .icon-f{fill:#fff!important}
.tsep{width:30px;height:0;margin:2px 0;flex-shrink:0}
.tip{position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);
  background:var(--ink);color:#fff;font-size:9px;letter-spacing:.04em;
  white-space:nowrap;padding:4px 9px;pointer-events:none;
  opacity:0;transition:opacity .1s;z-index:300}
.tbtn:hover .tip{opacity:1}

/* ───────── CANVAS AREA ───────── */
#canvaswrap{flex:1;display:flex;align-items:center;justify-content:center;
  background:#fafafa;position:relative;overflow:hidden;min-width:0}
#grid-bg{position:absolute;inset:0;pointer-events:none;z-index:0}
#cv{background:transparent;position:relative;z-index:2;display:block;
  box-shadow:0 0 0 3px var(--border)}
#cv-bg{position:absolute;z-index:1;background:#fff;pointer-events:none}
#pixel-grid{position:absolute;z-index:3;pointer-events:none;display:none}
#cursor-ring{position:absolute;z-index:10;pointer-events:none;
  border:1px solid rgba(0,0,0,.4);border-radius:50%;
  transform:translate(-50%,-50%);transition:width .06s,height .06s}
#badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(10,10,10,.85);color:#fff;font-size:10px;letter-spacing:.06em;
  padding:4px 13px;pointer-events:none;opacity:0;
  transition:opacity .2s;z-index:20}
#badge.show{opacity:1}

/* ───────── RIGHT PANEL ───────── */
#rp{width:240px;flex-shrink:0;border-left:3px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;min-height:0;background:#fff}
.rps{padding:14px 16px;border-bottom:2px solid #eee;flex-shrink:0}
.rpl{font-family:'TT Interphases Condensed',sans-serif;font-weight:600;font-size:13px;
  text-transform:uppercase;letter-spacing:.02em;color:#111;margin-bottom:9px;display:block}
.rprow{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.rprow label{font-size:10px;color:#888;white-space:nowrap;min-width:38px}
.rv{font-size:10px;color:#111;min-width:24px;text-align:right}
input[type=range]{-webkit-appearance:none;flex:1;height:2px;
  background:#ddd;cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;
  width:12px;height:12px;background:var(--ink);border:2px solid #111;cursor:pointer}
input[type=color]{width:26px;height:26px;border:2px solid var(--border);
  cursor:pointer;padding:0;background:none;flex-shrink:0}
#palette{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.sw{width:20px;height:20px;border:2px solid transparent;
  cursor:pointer;transition:transform .1s,border-color .1s;flex-shrink:0}
.sw:hover{transform:scale(1.15)}
.sw.on{border-color:var(--ink)!important}
.sfrow{display:flex;gap:6px;margin-top:6px}
.sfchip{flex:1;padding:6px 0;text-align:center;font-size:10px;letter-spacing:.04em;
  text-transform:uppercase;border:2px solid var(--border);
  cursor:pointer;color:#111;transition:all .1s;font-weight:600;
  font-family:'TT Interphases Condensed',sans-serif}
.sfchip.on{background:var(--ink);color:#fff}
.behgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.behchip{padding:7px 0;text-align:center;font-size:10px;letter-spacing:.03em;
  text-transform:uppercase;border:2px solid var(--border);
  cursor:pointer;color:#111;transition:all .1s;font-weight:600;
  font-family:'TT Interphases Condensed',sans-serif}
.behchip.on{background:var(--ink);color:#fff}
#pixelControls{display:none}
.pgbtn{background:#fff;border:2px solid var(--border);
  color:#111;padding:5px 9px;cursor:pointer;
  font-size:10px;transition:all .1s;font-weight:600}
.pgbtn:hover{background:#f1f1f1}
.pgbtn.on{background:var(--ink);color:#fff}

/* saved */
#savedwrap{flex:1;overflow-y:auto;min-height:0}
#savedgrid{padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start}
.sthumb{aspect-ratio:1;border:2px solid var(--border);
  background:repeating-conic-gradient(#e8e8e8 0% 25%,#fff 0% 50%) 0 0/10px 10px;
  cursor:grab;position:relative;overflow:hidden;transition:opacity .15s}
.sthumb canvas{width:100%;height:100%;display:block}
.sname{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.9);
  font-size:8px;letter-spacing:.02em;padding:2px 4px;color:#777;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdel{position:absolute;top:2px;right:2px;background:rgba(255,255,255,.92);border:none;
  width:17px;height:17px;cursor:pointer;font-size:10px;
  display:none;align-items:center;justify-content:center;color:var(--accent)}
.sthumb:hover .sdel{display:flex}
.sempty{font-size:11px;color:#999;grid-column:span 2;
  text-align:center;padding:24px 0;line-height:1.8}

/* ───────── BOTTOM BAR ───────── */
#bottombar{height:50px;display:flex;align-items:center;gap:10px;
  padding:0 18px;border-top:3px solid var(--border);background:#fff;flex-shrink:0}
.abtn{display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;color:#111;padding:0}
.abtn .sqbtn{width:30px;height:30px;border:2px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;transition:background .12s}
.abtn:hover .sqbtn{background:#f1f1f1}
.abtn.red:hover .sqbtn{border-color:var(--accent);color:var(--accent)}
.abtn span.lbl{font-size:8px;text-transform:uppercase;letter-spacing:.04em;color:#888}
#bbhint{margin-left:auto;font-size:10px;color:#999;letter-spacing:.02em}
</style>
</head>

  <button class="tbtn" data-tool="dots" onclick="setTool(this)">

    <svg width="18" height="18" fill="none"><circle class="icon-f" cx="5" cy="5" r="1.3" fill="#1a1a1a"/><circle class="icon-f" cx="9" cy="9" r="1.3" fill="#1a1a1a"/><circle class="icon-f" cx="13" cy="5" r="1.3" fill="#1a1a1a"/><circle class="icon-f" cx="5" cy="13" r="1.3" fill="#1a1a1a"/><circle class="icon-f" cx="13" cy="13" r="1.3" fill="#1a1a1a"/></svg>
  </button>
  <button class="tbtn" data-tool="scratches" onclick="setTool(this)">

    <svg width="18" height="18" fill="none"><path class="icon-s" d="M4 5q3-1 2 4q-1 3 2 4" stroke="#1a1a1a" stroke-width="1.2" fill="none"/><path class="icon-s" d="M10 3q3 2 1 6q-2 3 1 5" stroke="#1a1a1a" stroke-width="1.2" fill="none"/></svg>
  </button>
  <div class="tsep"></div>
  <button class="tbtn" data-tool="mirror" onclick="setTool(this)">
    <div class="tip">mirror brush</div>
    <svg width="18" height="18" fill="none"><line class="icon-s" x1="9" y1="2" x2="9" y2="16" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="2 2"/><path class="icon-s" d="M3 6 Q5 9 3 13" stroke="#1a1a1a" stroke-width="1.4" fill="none"/><path class="icon-s" d="M15 6 Q13 9 15 13" stroke="#1a1a1a" stroke-width="1.4" fill="none"/></svg>
  </button>
  <button class="tbtn" data-tool="pixel" onclick="setTool(this)">
    <div class="tip">pixel grid</div>
    <svg width="18" height="18" fill="none"><rect class="icon-s" x="2" y="2" width="14" height="14" stroke="#1a1a1a" stroke-width="1.1"/><line class="icon-s" x1="9" y1="2" x2="9" y2="16" stroke="#1a1a1a" stroke-width=".8"/><line class="icon-s" x1="2" y1="9" x2="16" y2="9" stroke="#1a1a1a" stroke-width=".8"/></svg>
  </button>
  <div class="tsep"></div>
  <button class="tbtn" data-tool="eraser" onclick="setTool(this)">
    <div class="tip">eraser</div>
    <svg width="18" height="18" fill="none"><rect class="icon-s" x="2" y="9" width="9" height="6" rx="1.5" stroke="#1a1a1a" stroke-width="1.2"/><line class="icon-s" x1="2" y1="15" x2="16" y2="15" stroke="#1a1a1a" stroke-width="1.2"/><line class="icon-s" x1="6" y1="9" x2="13" y2="3" stroke="#1a1a1a" stroke-width="1.2"/><line class="icon-s" x1="11" y1="9" x2="16" y2="5" stroke="#1a1a1a" stroke-width="1.2"/></svg>
  </button>

  </div>
</div>

<div id="canvaswrap">

<!-- RIGHT PANEL -->
<div id="rp">

<!-- BOTTOM BAR -->
<div id="bottombar">
  <button class="abtn" onclick="doShuffle()"><span class="sqbtn"><svg width="14" height="14" viewBox="0 0 16 16"><path d="M2 8a6 6 0 0 1 11-3.5M14 2v4h-4M14 8a6 6 0 0 1-11 3.5M2 14v-4h4" fill="none" stroke="currentColor" stroke-width="1.4"/></svg></span><span class="lbl">shuffle</span></button>
  <button class="abtn" onclick="doPixelate()"><span class="sqbtn"><svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="1" width="5" height="5"/><rect x="8" y="1" width="5" height="5"/><rect x="1" y="8" width="5" height="5"/><rect x="8" y="8" width="5" height="5"/></svg></span><span class="lbl">pixelate</span></button>
  <button class="abtn" onclick="doMirrorH()"><span class="sqbtn"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M7 1v12M2 4l-1 3 1 3M12 4l1 3-1 3" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></span><span class="lbl">flip</span></button>
  <button class="abtn" onclick="doInvert()"><span class="sqbtn"><svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M7 1.5a5.5 5.5 0 0 1 0 11z" fill="currentColor"/></svg></span><span class="lbl">invert</span></button>
  <button class="abtn" onclick="undoStep()"><span class="sqbtn"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M4 3 1 6l3 3M1 6h7a4 4 0 1 1 0 8h-1" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></span><span class="lbl">undo</span></button>
  <button class="abtn red" onclick="clearCanvas()"><span class="sqbtn"><svg width="13" height="13" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.6"/></svg></span><span class="lbl">clear</span></button>
  <span id="bbhint">scroll = size &nbsp;&middot;&nbsp; alt = line &nbsp;&middot;&nbsp; ctrl+z = undo (&times;3)</span>
</div>
</div>

<script>

// always fetch a fresh copy of the cracks page — avoids the browser
// serving a stale cached version when navigating between the two pages
(function(){
  const t=Date.now();
  document.querySelectorAll('a[href^="cracks.html"]').forEach(a=>{a.href='cracks.html?v='+t;});
})();

// ═══════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════
const cv   = document.getElementById('cv');
const cvBg = document.getElementById('cv-bg');
const pgCv = document.getElementById('pixel-grid');
const ctx  = cv.getContext('2d');
const bgCtx= cvBg.getContext('2d');
const pgCtx= pgCv.getContext('2d');
const wrapEl= document.getElementById('canvaswrap');
const cursorEl=document.getElementById('cursor-ring');

const CSIZE=380;
[cv,cvBg,pgCv].forEach(c=>{c.width=CSIZE;c.height=CSIZE;});
cv.style.cssText =`position:relative;z-index:2;display:block;cursor:crosshair;
  box-shadow:0 2px 32px rgba(0,0,0,.1),0 0 0 1px var(--border)`;
cvBg.style.cssText=`position:absolute;z-index:1;pointer-events:none`;
pgCv.style.cssText=`position:absolute;z-index:3;pointer-events:none;display:none`;

// white bg drawn on cvBg (so cv stays transparent for PNG export)
bgCtx.fillStyle='#fff';bgCtx.fillRect(0,0,CSIZE,CSIZE);

// position bg and grid canvases to align with cv
function alignOverlays(){
  const r=cv.getBoundingClientRect();
  const wr=wrapEl.getBoundingClientRect();
  const left=r.left-wr.left, top=r.top-wr.top;
  [cvBg,pgCv].forEach(c=>{
    c.style.left=left+'px';c.style.top=top+'px';
    c.style.width=r.width+'px';c.style.height=r.height+'px';
  });
}
window.addEventListener('resize',alignOverlays);
setTimeout(alignOverlays,50);

// ── undo stack (3 steps) ──────────────────
const UNDO_MAX=3;
const undoStack=[];
function pushUndo(){
  undoStack.push(ctx.getImageData(0,0,CSIZE,CSIZE));
  if(undoStack.length>UNDO_MAX) undoStack.shift();
}
function undoStep(){
  if(!undoStack.length) return;
  ctx.putImageData(undoStack.pop(),0,0);
}

// ── state ────────────────────────────────
let tool='brush';
let brushSz=10;
let strokeColor='#1a1a1a';
let fillColor  ='#1a1a1a';
let strokeW=1.5;
let opacity=1;
let useStroke=true;
let useFill  =true;
let behavior ='even';
let isDrawing=false;
let lastX=0,lastY=0;
let strokeLen=0,estimatedLen=9999;
let altDown=false,altStart=null;

// brush path for smooth stroke
let bPath=[];
let bSizes=[];

// pixel grid
let gridSize=16;
let pixelMode=false;

// ── palette ──────────────────────────────
const PAL=['#1a1a1a','#3d3d3d','#777','#b0ab9e','#fff',
  '#cc2200','#e05800','#d4a200','#3a7d44','#1c5fa5',
  '#6d2fa0','#c4385b','#6b4c2a','#2a9d8f','#e9c46a'];
(()=>{
  const p=document.getElementById('palette');
  PAL.forEach((col,i)=>{
    const s=document.createElement('div');
    s.className='sw'+(i===0?' on':'');
    s.style.background=col;
    if(col==='#fff') s.style.border='1.5px solid #ccc';
    s.onclick=()=>{
      strokeColor=fillColor=col;
      document.getElementById('strokeCol').value=col;
      document.getElementById('fillCol').value=col;
      document.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));
      s.classList.add('on');
    };
    p.appendChild(s);
  });
})();

// ── cursor ring ──────────────────────────
wrapEl.addEventListener('mousemove',e=>{
  const wr=wrapEl.getBoundingClientRect();
  cursorEl.style.left=(e.clientX-wr.left)+'px';
  cursorEl.style.top =(e.clientY-wr.top)+'px';
  const cvr=cv.getBoundingClientRect();
  const sc=cvr.width/CSIZE;
  const sz=Math.max(2,brushSz*sc);
  cursorEl.style.width=sz+'px';cursorEl.style.height=sz+'px';
});

// ── helpers ──────────────────────────────
function getPos(e){
  const r=cv.getBoundingClientRect();
  return{x:(e.clientX-r.left)*(CSIZE/r.width),
         y:(e.clientY-r.top )*(CSIZE/r.height)};
}

function currentSz(){
  switch(behavior){
    case 'even': return brushSz;
    case 'taper':{
      const t=Math.max(0,Math.min(1,strokeLen/Math.max(1,estimatedLen)));
      return Math.max(0.5, brushSz*Math.sin(t*Math.PI));
    }
    case 'rand':
      return brushSz*0.2 + Math.random()*brushSz*0.8; // 20%–100% of brushSz, truly random
    case 'pulse':{
      const t=strokeLen*0.06;
      return brushSz*(0.3+0.7*((Math.sin(t)+1)/2));
    }
  }
  return brushSz;
}

// ── smooth brush flush ───────────────────
// Brush tool: always draws with fillColor as thick stroke.
// Stroke toggle removed for brush — no outline mode.
// Mirror tool: same but reflected horizontally.
function flushBrush(){
  if(bPath.length<2) return;
  ctx.save();
  ctx.globalAlpha=opacity;
  ctx.lineCap='round';ctx.lineJoin='round';
  for(let i=1;i<bPath.length;i++){
    const p0=bPath[i-1],p1=bPath[i];
    const w=Math.max(0.5,bSizes[i]);
    const mx=(p0.x+p1.x)/2,my=(p0.y+p1.y)/2;
    const prevMx=i>=2?(bPath[i-2].x+p0.x)/2:p0.x;
    const prevMy=i>=2?(bPath[i-2].y+p0.y)/2:p0.y;

    // draw the stroke segment
    ctx.beginPath();
    ctx.moveTo(prevMx,prevMy);
    ctx.quadraticCurveTo(p0.x,p0.y,mx,my);
    ctx.strokeStyle=fillColor;
    ctx.lineWidth=w;
    ctx.stroke();

    // mirror: draw reflected copy
    if(tool==='mirror'){
      ctx.save();
      ctx.transform(-1,0,0,1,CSIZE,0); // flip horizontally around centre
      ctx.beginPath();
      ctx.moveTo(prevMx,prevMy);
      ctx.quadraticCurveTo(p0.x,p0.y,mx,my);
      ctx.strokeStyle=fillColor;
      ctx.lineWidth=w;
      ctx.stroke();
      ctx.restore();
    }
  }
  ctx.restore();ctx.globalAlpha=1;
}

// ── stamp tools (non-brush) ──────────────
function stamp(x,y){
  const sz=currentSz();
  ctx.save();ctx.translate(x,y);ctx.globalAlpha=opacity;

  const sf=()=>{
    if(useFill  ){ctx.fillStyle  =fillColor;  ctx.fill();  }
    if(useStroke){ctx.strokeStyle=strokeColor;ctx.lineWidth=strokeW;ctx.stroke();}
  };

  switch(tool){
    case 'pebbles':{
      // a small scatter of clean, round pebbles — varied sizes, smooth edges
      const count=3+Math.floor(Math.random()*4);
      for(let i=0;i<count;i++){
        const a=Math.random()*Math.PI*2;
        const dist=Math.random()*sz*0.3;
        const pr=sz*(0.16+Math.random()*0.22);
        const squish=0.8+Math.random()*0.2; // gentle oval, edges stay smooth/round
        ctx.save();
        ctx.translate(Math.cos(a)*dist,Math.sin(a)*dist);
        ctx.rotate(Math.random()*Math.PI*2);
        ctx.beginPath();
        ctx.ellipse(0,0,pr,pr*squish,0,0,Math.PI*2);
        ctx.closePath();
        sf();
        ctx.restore();
      }
      break;
    }
    case 'diamond':{
      const hw=sz/2;
      ctx.rotate((Math.random()-.5)*.4);
      ctx.beginPath();ctx.moveTo(0,-hw*1.4);ctx.lineTo(hw*.9,0);
      ctx.lineTo(0,hw*1.4);ctx.lineTo(-hw*.9,0);ctx.closePath();sf();break;
    }
    case 'triangle':{
      const hw=sz/2;
      ctx.rotate((Math.random()-.5)*.5);
      ctx.beginPath();ctx.moveTo(0,-hw*1.3);ctx.lineTo(hw,hw*.8);
      ctx.lineTo(-hw,hw*.8);ctx.closePath();sf();break;
    }
    case 'circles':{
      const r=sz/2;
      ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);sf();
      ctx.globalAlpha=opacity*.3;
      ctx.beginPath();ctx.arc(0,0,r*.5,0,Math.PI*2);
      if(useStroke){ctx.strokeStyle=strokeColor;ctx.lineWidth=strokeW*.6;ctx.stroke();}
      break;
    }
    case 'hatch':{
      const hw=sz/2,n=Math.max(2,3+Math.floor(sz/5));
      ctx.strokeStyle=strokeColor;ctx.lineWidth=Math.max(.4,strokeW*.7);
      for(let i=0;i<n;i++){const o=(i/(n-1))*hw*2-hw;
        ctx.beginPath();ctx.moveTo(-hw+o,-hw);ctx.lineTo(hw+o,hw);ctx.stroke();}
      break;
    }
    case 'dots':{
      const sp=Math.max(2,sz/4),cols=Math.ceil(sz/sp)+1;
      for(let rr=-cols;rr<=cols;rr++) for(let cc=-cols;cc<=cols;cc++){
        if(Math.hypot(rr,cc)*sp>sz/2) continue;
        ctx.beginPath();ctx.arc(cc*sp,rr*sp,Math.max(.4,sp*.18),0,Math.PI*2);
        if(useFill){ctx.fillStyle=fillColor;ctx.fill();}
        if(useStroke){ctx.strokeStyle=strokeColor;ctx.lineWidth=strokeW*.4;ctx.stroke();}
      }break;
    }
    case 'scratches':{
      ctx.strokeStyle=strokeColor;ctx.lineWidth=Math.max(.3,strokeW*.45);
      for(let i=0;i<3+Math.floor(Math.random()*4);i++){
        const l=sz*(.3+Math.random()*.8),a=Math.random()*Math.PI*2;
        let cx=-Math.cos(a)*l/2,cy=-Math.sin(a)*l/2;
        ctx.beginPath();ctx.moveTo(cx,cy);
        for(let j=0;j<5;j++){cx+=Math.cos(a+(Math.random()-.5)*.7)*l/5;
          cy+=Math.sin(a+(Math.random()-.5)*.7)*l/5;ctx.lineTo(cx,cy);}
        ctx.stroke();
      }break;
    }
    case 'eraser':
      ctx.globalCompositeOperation='destination-out';
      ctx.beginPath();ctx.arc(0,0,sz/2,0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,1)';ctx.fill();
      ctx.globalCompositeOperation='source-over';
      break;
  }
  ctx.restore();ctx.globalAlpha=1;
}

function paintBetween(x0,y0,x1,y1){
  const d=Math.hypot(x1-x0,y1-y0);
  const density=(tool==='brush'||tool==='mirror')?0.15:0.28;
  const steps=Math.max(1,Math.floor(d/(Math.max(1,brushSz)*density)));
  for(let i=1;i<=steps;i++){
    const t=i/steps;
    strokeLen+=d/steps;
    const px=x0+(x1-x0)*t, py=y0+(y1-y0)*t;
    if(tool==='brush'||tool==='mirror'){
      bPath.push({x:px,y:py});
      bSizes.push(currentSz());
    } else {
      stamp(px,py);
    }
  }
  estimatedLen=Math.max(estimatedLen,strokeLen*1.8);
  if(tool==='brush'||tool==='mirror') flushBrush();
}

// ── pixel grid drawing ───────────────────
function drawPixelGrid(){
  pgCtx.clearRect(0,0,CSIZE,CSIZE);
  const cell=CSIZE/gridSize;
  pgCtx.strokeStyle='rgba(100,100,200,0.25)';
  pgCtx.lineWidth=0.5;
  for(let i=0;i<=gridSize;i++){
    pgCtx.beginPath();pgCtx.moveTo(i*cell,0);pgCtx.lineTo(i*cell,CSIZE);pgCtx.stroke();
    pgCtx.beginPath();pgCtx.moveTo(0,i*cell);pgCtx.lineTo(CSIZE,i*cell);pgCtx.stroke();
  }
}
function setGridSize(n){
  gridSize=n;
  document.querySelectorAll('.pgbtn').forEach(b=>{
    b.classList.toggle('on',parseInt(b.textContent)===n);
  });
  drawPixelGrid();
}
function pixelPaint(x,y){
  const cell=CSIZE/gridSize;
  const col=Math.floor(x/cell),row=Math.floor(y/cell);
  ctx.save();ctx.globalAlpha=opacity;
  if(tool==='eraser'){
    ctx.globalCompositeOperation='destination-out';
    ctx.fillStyle='rgba(0,0,0,1)';
  } else {
    ctx.fillStyle=useFill?fillColor:strokeColor;
  }
  ctx.fillRect(col*cell,row*cell,cell,cell);
  if(tool!=='eraser'&&useStroke){
    ctx.strokeStyle=strokeColor;ctx.lineWidth=strokeW*.5;
    ctx.strokeRect(col*cell,row*cell,cell,cell);
  }
  ctx.restore();ctx.globalAlpha=1;
}

// ═══════════════════════════════════════
//  MOUSE EVENTS
// ═══════════════════════════════════════
let zigPhase=0;
let lastPixelCell={r:-1,c:-1};

cv.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  pushUndo();
  const{x,y}=getPos(e);
  isDrawing=true;lastX=x;lastY=y;
  strokeLen=0;estimatedLen=9999;
  bPath=[];bSizes=[];
  if(altDown){altStart={x,y};return;}
  if(pixelMode){pixelPaint(x,y);return;}
  if(tool==='brush'||tool==='mirror'){
    bPath.push({x,y});bSizes.push(brushSz);
  } else {
    stamp(x,y);
  }
});

cv.addEventListener('mousemove',e=>{
  if(!isDrawing) return;
  const{x,y}=getPos(e);
  if(altDown&&altStart){
    if(undoStack.length) ctx.putImageData(undoStack[undoStack.length-1],0,0);
    ctx.save();
    ctx.strokeStyle=fillColor;ctx.lineWidth=brushSz;
    ctx.globalAlpha=opacity;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(altStart.x,altStart.y);ctx.lineTo(x,y);ctx.stroke();
    ctx.restore();ctx.globalAlpha=1;return;
  }
  if(pixelMode){pixelPaint(x,y);lastX=x;lastY=y;return;}
  paintBetween(lastX,lastY,x,y);
  lastX=x;lastY=y;
});

cv.addEventListener('mouseup',e=>{
  if(!isDrawing) return;
  isDrawing=false;
  if(altDown&&altStart){
    const{x,y}=getPos(e);
    if(undoStack.length) ctx.putImageData(undoStack[undoStack.length-1],0,0);
    estimatedLen=Math.hypot(x-altStart.x,y-altStart.y);
    strokeLen=0;bPath=[];bSizes=[];
    bPath.push({x:altStart.x,y:altStart.y});bSizes.push(brushSz);
    const steps=Math.max(2,Math.ceil(estimatedLen/Math.max(1,brushSz*.12)));
    for(let i=1;i<=steps;i++){
      const t=i/steps;strokeLen+=estimatedLen/steps;
      bPath.push({x:altStart.x+(x-altStart.x)*t,y:altStart.y+(y-altStart.y)*t});
      bSizes.push(currentSz());
    }
    flushBrush();altStart=null;bPath=[];bSizes=[];return;
  }
  if(tool==='brush'||tool==='mirror'){flushBrush();bPath=[];bSizes=[];}
});

cv.addEventListener('mouseleave',()=>{
  if(isDrawing&&(tool==='brush'||tool==='mirror')) flushBrush();
  isDrawing=false;
});

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?-1:1;
  brushSz=Math.max(1,Math.min(400,brushSz+d*(brushSz>50?5:1.5)));
  const v=Math.round(brushSz);
  document.getElementById('rSize').value=v;
  document.getElementById('vSize').textContent=v;
  const sc=cv.getBoundingClientRect().width/CSIZE;
  const sz=Math.max(2,brushSz*sc);
  cursorEl.style.width=sz+'px';cursorEl.style.height=sz+'px';
},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.key==='Alt'){altDown=true;document.getElementById('badge').classList.add('show');}
  // ctrl+z: check both cases
  if((e.metaKey||e.ctrlKey)&&(e.key==='z'||e.key==='Z')){
    e.preventDefault();undoStep();
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='Alt'){altDown=false;altStart=null;document.getElementById('badge').classList.remove('show');}
});

// ═══════════════════════════════════════
//  TOOL & UI
// ═══════════════════════════════════════
function setTool(btn){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const newTool=btn.dataset.tool;

  // entering pixel mode
  if(newTool==='pixel'){
    pixelMode=true;
    tool='pixel';
    pgCv.style.display='block';
    document.getElementById('pixelControls').style.display='block';
    drawPixelGrid();
    cv.style.cursor='crosshair';
    return;
  }

  // leaving pixel mode when switching to any other tool
  pixelMode=false;
  pgCv.style.display='none';
  document.getElementById('pixelControls').style.display='none';
  // hide stroke chip for brush/mirror (they always use fillColor)
  const sfRow=document.querySelector('.sfrow');
  sfRow.style.display=(newTool==='brush'||newTool==='mirror')?'none':'flex';

  tool=newTool;
  bPath=[];bSizes=[];
  cv.style.cursor=tool==='eraser'?'cell':'crosshair';
}

function toggleSF(t){
  if(t==='s'){useStroke=!useStroke;document.getElementById('chipS').classList.toggle('on',useStroke);}
  else       {useFill  =!useFill;  document.getElementById('chipF').classList.toggle('on',useFill);}
}

function setBeh(b){
  behavior=b;
  document.querySelectorAll('.behchip').forEach(c=>c.classList.remove('on'));
  document.getElementById('beh-'+b).classList.add('on');
}

document.getElementById('rSize').addEventListener('input',e=>{
  brushSz=+e.target.value;document.getElementById('vSize').textContent=e.target.value;});
document.getElementById('rStrokeW').addEventListener('input',e=>{
  strokeW=+e.target.value;document.getElementById('vStrokeW').textContent=e.target.value;});
document.getElementById('rOpacity').addEventListener('input',e=>{
  opacity=+e.target.value;document.getElementById('vOpacity').textContent=(+e.target.value).toFixed(2);});
document.getElementById('strokeCol').addEventListener('input',e=>strokeColor=e.target.value);
document.getElementById('fillCol').addEventListener('input',e=>fillColor=e.target.value);

// ═══════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════
function clearCanvas(){pushUndo();ctx.clearRect(0,0,CSIZE,CSIZE);}

function doShuffle(){
  pushUndo();
  const snap=ctx.getImageData(0,0,CSIZE,CSIZE);
  const N=8,ts=Math.floor(CSIZE/N);
  const tiles=[];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const tc=document.createElement('canvas');tc.width=ts;tc.height=ts;
    tc.getContext('2d').putImageData(snap,-c*ts,-r*ts);
    tiles.push(tc);
  }
  for(let i=tiles.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tiles[i],tiles[j]]=[tiles[j],tiles[i]];}
  ctx.clearRect(0,0,CSIZE,CSIZE);
  tiles.forEach((t,i)=>ctx.drawImage(t,(i%N)*ts,Math.floor(i/N)*ts));
}

function doPixelate(){
  pushUndo();
  const px=Math.max(3,Math.round(brushSz*1.1));
  const s=Math.max(1,Math.floor(CSIZE/px));
  const tmp=document.createElement('canvas');tmp.width=s;tmp.height=s;
  tmp.getContext('2d').drawImage(cv,0,0,s,s);
  ctx.save();ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,CSIZE,CSIZE);ctx.drawImage(tmp,0,0,CSIZE,CSIZE);
  ctx.restore();
}

function doMirrorH(){
  pushUndo();
  ctx.save();ctx.scale(-1,1);ctx.drawImage(cv,-CSIZE,0);ctx.restore();
}

function doInvert(){
  pushUndo();
  const d=ctx.getImageData(0,0,CSIZE,CSIZE);
  for(let i=0;i<d.data.length;i+=4){
    if(d.data[i+3]===0) continue;
    d.data[i]=255-d.data[i];d.data[i+1]=255-d.data[i+1];d.data[i+2]=255-d.data[i+2];
  }
  ctx.putImageData(d,0,0);
}

// ═══════════════════════════════════════
//  SAVE — transparent PNG
// ═══════════════════════════════════════
let savedElements=[];
try{savedElements=JSON.parse(localStorage.getItem('fracture_elements')||'[]');}catch(e){}

function saveElement(){
  const name=document.getElementById('saveName').value.trim()||('el '+(savedElements.length+1));
  if(savedElements.length>=10) savedElements.shift();
  // cv itself has transparent background — just export it directly
  const dataURL=cv.toDataURL('image/png');
  savedElements.push({name,dataURL,id:Date.now()});
  persist();renderSaved();
  document.getElementById('saveName').value='';
}

function deleteElement(id){savedElements=savedElements.filter(e=>e.id!==id);persist();renderSaved();}

function persist(){
  try{localStorage.setItem('fracture_elements',JSON.stringify(savedElements));}catch(e){}
  document.getElementById('savedCount').textContent=`(${savedElements.length}/10)`;
}

function renderSaved(){
  const grid=document.getElementById('savedgrid');
  grid.innerHTML='';
  if(!savedElements.length){
    grid.innerHTML='<div class="sempty">nothing saved yet<br>draw & save →</div>';
    return;
  }
  savedElements.forEach(el=>{
    const wrap=document.createElement('div');
    wrap.className='sthumb';wrap.draggable=true;wrap.title=el.name;
    const tc=document.createElement('canvas');tc.width=90;tc.height=90;
    const img=new Image();img.src=el.dataURL;
    img.onload=()=>tc.getContext('2d').drawImage(img,0,0,90,90);
    wrap.appendChild(tc);
    const nm=document.createElement('div');nm.className='sname';nm.textContent=el.name;
    wrap.appendChild(nm);
    const del=document.createElement('button');del.className='sdel';del.textContent='×';
    del.onclick=ev=>{ev.stopPropagation();deleteElement(el.id);};
    wrap.appendChild(del);
    wrap.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('text/plain',String(el.id));
      localStorage.setItem('fracture_drag_id',String(el.id));
    });
    wrap.addEventListener('dblclick',()=>{
      pushUndo();ctx.clearRect(0,0,CSIZE,CSIZE);
      const img2=new Image();img2.src=el.dataURL;
      img2.onload=()=>ctx.drawImage(img2,0,0,CSIZE,CSIZE);
    });
    grid.appendChild(wrap);
  });
  document.getElementById('savedCount').textContent=`(${savedElements.length}/10)`;
}

window.setGridSize=setGridSize;
renderSaved();

</script>
