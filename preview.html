<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Fracture — Preview</title>
<style>
@font-face{font-family:'TT Gertika';src:url('fonts/TT_Gertika_Educational_Variable.ttf') format('truetype');font-weight:100 900}
@font-face{font-family:'TT Interphases Condensed';src:url('fonts/TT_Interphases_Pro_Educational_Condensed_DemiBold.ttf') format('truetype');font-weight:600}
@font-face{font-family:'TT Commons Pro';src:url('fonts/TT_Commons_Pro_VF_Educational.ttf') format('truetype');font-weight:100 900}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:'TT Commons Pro',sans-serif;color:#111}
button,input{font-family:inherit}

/* ── SETUP SCREEN ── */
#setup{
  position:fixed;inset:0;background:#fff;
  display:flex;align-items:center;justify-content:center;
  z-index:300;
}
.setup-inner{text-align:center;max-width:560px;padding:20px}
#setupHeadline{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
#setupHeadline .h1{font-family:'TT Gertika',sans-serif;font-weight:800;font-size:46px;line-height:1}
#setupHeadline .squiggle{width:30px;height:26px}
#setupHeadline .h2{font-family:'TT Gertika',sans-serif;font-weight:400;font-size:24px;color:#222}
.setup-sub{font-family:'TT Interphases Condensed',sans-serif;font-weight:600;font-size:13px;
  letter-spacing:.04em;color:#888;text-transform:uppercase;margin-bottom:30px}
.ratio-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:30px}
.ratio-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  background:#fff;border:2px solid #111;
  padding:14px 10px;cursor:pointer;transition:all .15s;
  font-family:'TT Commons Pro',sans-serif;width:78px;height:92px;
}
.ratio-btn:hover{background:#f1f1f1}
.ratio-box{border:2px solid #111;transition:border-color .15s}
.ratio-btn span{font-size:10px;letter-spacing:.04em;color:#111}
.back-link{font-size:11px;letter-spacing:.02em;color:#888;text-decoration:none}
.back-link:hover{color:#111}

/* ── STAGE ── */
#stage{
  position:fixed;inset:0;display:none;
  align-items:center;justify-content:center;
  background:#eee;
}
#canvasWrap{position:relative;background:#fff;box-shadow:0 0 0 2px #111}
#canvasWrap:fullscreen,#canvasWrap:-webkit-full-screen{box-shadow:none}
canvas{display:block}
#canvasWrap.manual canvas{cursor:crosshair}
#manualHint{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:.03em;color:#444;
  background:rgba(255,255,255,.9);padding:6px 12px;
  border:2px solid #111;pointer-events:none;opacity:0;transition:opacity .25s;
  white-space:nowrap;
}
#stage.manual #manualHint{opacity:1}

/* ── CONTROLS ── */
#controls{
  position:fixed;bottom:18px;left:0;right:0;
  display:none;flex-wrap:wrap;justify-content:center;gap:8px;
  padding:0 10px;z-index:250;
}
.cbtn{
  display:inline-block;text-decoration:none;
  background:#fff;border:2px solid #111;
  color:#111;padding:7px 13px;cursor:pointer;font-size:12px;
  font-family:'TT Interphases Condensed',sans-serif;font-weight:600;transition:all .12s;
}
.cbtn:hover{background:#f1f1f1}
.cbtn.on{background:#111;color:#fff}
</style>
</head>
<body>

<div id="setup">
  <div class="setup-inner">
    <div id="setupHeadline">
      <span class="h1">cracks</span>
      <svg class="squiggle" viewBox="0 0 60 50"><polyline points="4,4 40,20 18,30 54,46" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="h2">generator</span>
    </div>
    <div class="setup-sub">choose a canvas shape</div>
    <div class="ratio-grid" id="ratioGrid"></div>
    <a class="back-link" href="cracks.html">&#8592; back to editor</a>
  </div>
</div>

<div id="stage">
  <div id="canvasWrap"><canvas id="cv"></canvas></div>
  <div id="manualHint">click anywhere to create a crack</div>
</div>

<div id="controls">
  <button class="cbtn" id="btnMode" title="switch between automatic and manual">🤖 auto</button>
  <button class="cbtn" id="btnPause" title="pause / resume">⏸ pause</button>
  <button class="cbtn" id="btnDepth" title="toggle depth view">🌊 depth</button>
  <button class="cbtn" id="btnBg" title="toggle dark background">☾ dark</button>
  <button class="cbtn" id="btnBW" title="black & white mode">⬛ b/w</button>
  <button class="cbtn" id="btnFS" title="fullscreen">⛶ full</button>
  <button class="cbtn" id="btnSnap" title="save a snapshot">⤓ jpg</button>
  <button class="cbtn" id="btnBack" title="choose another shape">↺ shape</button>
  <a class="cbtn" id="btnToCracks" href="cracks.html" title="back to the editor">← cracks</a>
</div>

<script>
// always fetch a fresh copy of the editor page — avoids the browser
// serving a stale cached version when navigating between the two pages
(function(){
  const t=Date.now();
  document.querySelectorAll('a[href^="cracks.html"]').forEach(a=>{a.href='cracks.html?v='+t;});
})();

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const stage=document.getElementById('stage');
const wrap=document.getElementById('canvasWrap');
let W=0,H=0,DPR=devicePixelRatio||1;

// ═══════════════════════════════════════════════════
//  SETUP SCREEN — pick an aspect ratio, then the canvas
//  is sized to fit the screen while keeping that ratio.
// ═══════════════════════════════════════════════════
const RATIOS=[
  {w:1,h:1,label:'1:1'},
  {w:4,h:3,label:'4:3'},
  {w:3,h:4,label:'3:4'},
  {w:16,h:9,label:'16:9'},
  {w:9,h:16,label:'9:16'},
  {w:3,h:2,label:'3:2'},
  {w:2,h:3,label:'2:3'},
];
let chosenRatio=null;

(function buildRatioGrid(){
  const grid=document.getElementById('ratioGrid');
  const innerMax=42;
  RATIOS.forEach(r=>{
    const btn=document.createElement('button');
    btn.className='ratio-btn';
    const box=document.createElement('div');
    box.className='ratio-box';
    let bw,bh;
    if(r.w>=r.h){ bw=innerMax; bh=innerMax*r.h/r.w; } else { bh=innerMax; bw=innerMax*r.w/r.h; }
    box.style.width=Math.round(bw)+'px'; box.style.height=Math.round(bh)+'px';
    btn.appendChild(box);
    const lab=document.createElement('span'); lab.textContent=r.label;
    btn.appendChild(lab);
    btn.addEventListener('click',()=>startPreview(r));
    grid.appendChild(btn);
  });
})();

function startPreview(r){
  chosenRatio=r;
  document.getElementById('setup').style.display='none';
  stage.style.display='flex';
  document.getElementById('controls').style.display='flex';
  fitCanvasToRatio();
  lastT=performance.now();
  nextSpawnAt=lastT+300;
  requestAnimationFrame(loop);
}

function fitCanvasToRatio(){
  if(!chosenRatio) return;
  const maxW=stage.clientWidth-28, maxH=stage.clientHeight-28;
  let w=maxW, h=w*chosenRatio.h/chosenRatio.w;
  if(h>maxH){ h=maxH; w=h*chosenRatio.w/chosenRatio.h; }
  wrap.style.width=Math.round(w)+'px';
  wrap.style.height=Math.round(h)+'px';
  resizeCanvasBuffer();
}
function resizeCanvasBuffer(){
  W=wrap.clientWidth; H=wrap.clientHeight;
  cv.width=Math.max(1,Math.round(W*DPR));
  cv.height=Math.max(1,Math.round(H*DPR));
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',()=>{ if(chosenRatio) fitCanvasToRatio(); });
document.addEventListener('fullscreenchange',()=>requestAnimationFrame(fitCanvasToRatio));
document.addEventListener('webkitfullscreenchange',()=>requestAnimationFrame(fitCanvasToRatio));

// ═══════════════════════════════════════════════════
//  COLOR UTILITIES (same math as the main editor)
// ═══════════════════════════════════════════════════
function hslToHex(h,s,l){
  s=Math.max(0,Math.min(1,s));l=Math.max(0,Math.min(1,l));
  const c=(1-Math.abs(2*l-1))*s;
  const x=c*(1-Math.abs((h/60)%2-1));
  const m=l-c/2;
  let r,g,b;
  if(h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;}
  else if(h<180){r=0;g=c;b=x;} else if(h<240){r=0;g=x;b=c;}
  else if(h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
  const toHex=v=>Math.round((v+m)*255).toString(16).padStart(2,'0');
  return '#'+toHex(r)+toHex(g)+toHex(b);
}
function hexToHsl(hex){
  hex=(hex||'#191919').replace('#','');
  const r=parseInt(hex.substr(0,2),16)/255;
  const g=parseInt(hex.substr(2,2),16)/255;
  const b=parseInt(hex.substr(4,2),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let h=0,s=0;const l=(mx+mn)/2;
  const d=mx-mn;
  if(d!==0){
    s=d/(1-Math.abs(2*l-1));
    switch(mx){
      case r: h=((g-b)/d)%6; break;
      case g: h=(b-r)/d+2; break;
      default: h=(r-g)/d+4;
    }
    h*=60; if(h<0)h+=360;
  }
  return [h,s,l];
}
function randomCrackColor(){
  if(Math.random()<0.35){
    // a classic dark "ink" crack, occasionally with a faint color tint
    return hslToHex(Math.random()*360, Math.random()*0.15, 0.06+Math.random()*0.10);
  }
  return hslToHex(Math.random()*360, 0.45+Math.random()*0.45, 0.12+Math.random()*0.20);
}

// ═══════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════
let particles=[];
function burst(x,y,count,spd,col){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=spd*(0.4+Math.random()*0.9);
    const sz=1.2+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:0.022+Math.random()*0.035,sz,
      col:col||'#1a1a1a',ang:Math.random()*Math.PI*2,va:(Math.random()-.5)*14});
  }
}
function tickParticles(dt){
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=35*dt;
    p.vx*=0.91;p.vy*=0.91;p.ang+=p.va*dt;p.life-=p.decay;
  }
  particles=particles.filter(p=>p.life>0);
}
function drawParticles(){
  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life;
    ctx.translate(p.x,p.y);ctx.rotate(p.ang);
    ctx.fillStyle=p.col;ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════
//  CRACK GEOMETRY (same model as the main editor, minus
//  the letter/node system — these cracks are purely ambient)
// ═══════════════════════════════════════════════════
function makeSegs(ox,oy,angle,totalLen,startW,chaos){
  const pts=[{x:ox,y:oy,w:startW}];
  let x=ox,y=oy,a=angle,traveled=0;
  while(traveled<totalLen){
    const seg=9+Math.random()*16;
    a+=(Math.random()-.5)*(chaos*0.055);
    if(Math.random()<0.18) a+=(Math.random()-.5)*(chaos*0.15);
    x+=Math.cos(a)*seg; y+=Math.sin(a)*seg;
    traveled+=seg;
    const t=traveled/totalLen;
    const w=startW*Math.pow(1-t,0.7);
    pts.push({x,y,w:Math.max(0,w)});
  }
  if(pts.length) pts[pts.length-1].w=0;
  return pts;
}
function buildArm(ox,oy,angle,len,baseW,chaos,depth,maxB){
  const segs=makeSegs(ox,oy,angle,len,baseW,chaos);
  const branches=[];
  if(depth>0&&maxB>0&&segs.length>4){
    const count=Math.min(maxB,1+(depth>1&&Math.random()<.5?1:0));
    const used=new Set();
    for(let i=0;i<count;i++){
      let bi;
      for(let t=0;t<8;t++){
        bi=Math.floor(segs.length*(.1+Math.random()*.75));
        if(!used.has(bi)){used.add(bi);break;}
      }
      const bp=segs[bi]; if(!bp||bp.w<0.2) continue;
      const p0=segs[Math.max(0,bi-1)];
      const la=Math.atan2(bp.y-p0.y,bp.x-p0.x);
      const side=Math.random()<.5?1:-1;
      const brA=la+side*(.35+Math.random()*.85);
      const brLen=len*(depth===2?.18+Math.random()*.3:.1+Math.random()*.2);
      const brW=bp.w*(.5+Math.random()*.25);
      const branch=buildArm(bp.x,bp.y,brA,brLen,brW,chaos,depth-1,Math.max(0,maxB-1));
      branch.attachFrac=bi/segs.length;
      branches.push(branch);
    }
  }
  return{segs, branches, nodes:[], born:performance.now()};
}
// no letters ever attach in preview mode, so there are never any nodes —
// this just returns the segment's own width, kept as a function so
// drawArm/drawHub are drop-in identical to the main editor's.
function getEffectiveW(arm,i){ return arm.segs[i].w; }

// ═══════════════════════════════════════════════════
//  DEPTH MODE — same nested-band bathymetric look as the
//  main editor, tinted by each crack's own color.
// ═══════════════════════════════════════════════════
const DEPTH_BANDS=7;
function depthBandColor(h,s,isDarkBg,t){
  let lShallow,lDeep;
  if(isDarkBg){ lShallow=0.30; lDeep=0.93; } else { lShallow=0.86; lDeep=0.14; }
  const sShallow=Math.max(0,s*0.4), sDeep=Math.min(1,s*1.15);
  const l=lShallow+(lDeep-lShallow)*t;
  const sat=sShallow+(sDeep-sShallow)*t;
  return hslToHex(h,sat,l);
}
function depthGlobalMax(){
  let mx=0.0001;
  function walk(arm){
    for(let i=0;i<arm.segs.length;i++){ const w=getEffectiveW(arm,i); if(w>mx) mx=w; }
    arm.branches.forEach(walk);
  }
  cracks.forEach(g=>g.arms.forEach(walk));
  return mx;
}

function drawHub(g, flatColor, depthOn, hs, depthMax, widthScale){
  widthScale = widthScale===undefined?1:widthScale;
  const mains=g.mainArms||g.arms;
  if(mains.length<2) return;
  let maxW=0;
  for(const arm of mains){
    if(!arm.segs||!arm.segs.length) continue;
    const w=getEffectiveW(arm,0)*widthScale;
    if(w>maxW) maxW=w;
  }
  if(maxW<=0.5) return;
  if(depthOn){
    const dm=(depthMax||maxW)*widthScale;
    const outer=maxW*1.1;
    for(let k=0;k<DEPTH_BANDS;k++){
      const r=outer-(k/DEPTH_BANDS)*dm;
      if(r<=0.5) continue;
      const t=k/(DEPTH_BANDS-1);
      ctx.beginPath();ctx.arc(g.ox,g.oy,r,0,Math.PI*2);ctx.closePath();
      ctx.fillStyle=depthBandColor(hs.h,hs.s,hs.isDarkBg,t);
      ctx.fill();
      ctx.lineWidth=1;
      ctx.strokeStyle=hs.isDarkBg?'rgba(0,0,0,0.18)':'rgba(255,255,255,0.35)';
      ctx.stroke();
    }
  } else {
    ctx.beginPath();ctx.arc(g.ox,g.oy,maxW*1.1,0,Math.PI*2);ctx.closePath();
    ctx.fillStyle=flatColor||'#191919';
    ctx.fill();
  }
}

function drawArm(arm, prog, color, depthOn, depthMax, hs, widthScale, lengthFactor){
  const segs=arm.segs;
  if(!segs||segs.length<2) return;
  widthScale = widthScale===undefined?1:widthScale;
  lengthFactor = lengthFactor===undefined?1:lengthFactor;
  if(lengthFactor<=0.004 || widthScale<=0.004) return;
  const p=Math.min(1, Math.min(prog??1, lengthFactor));
  const vis=Math.max(2,Math.floor(segs.length*p));
  const v=segs.slice(0,vis);

  if(p<0.98&&Math.random()<.08){
    const tip=v[v.length-1];
    burst(tip.x,tip.y,1,2.5);
  }

  const NX=[],NY=[],WS=[];
  for(let i=0;i<v.length;i++){
    let dx,dy;
    if(i<v.length-1){dx=v[i+1].x-v[i].x;dy=v[i+1].y-v[i].y;}
    else{dx=v[i].x-v[i-1].x;dy=v[i].y-v[i-1].y;}
    const ln=Math.hypot(dx,dy)||1;
    NX.push(-dy/ln); NY.push(dx/ln);
    WS.push(getEffectiveW(arm,i)*widthScale);
  }

  if(depthOn){
    const isDarkBg=hs.isDarkBg;
    const dm=depthMax*widthScale;
    for(let k=0;k<DEPTH_BANDS;k++){
      const inset=(k/DEPTH_BANDS)*dm;
      const Lk=[],Rk=[]; let any=false;
      for(let i=0;i<v.length;i++){
        const wk=Math.max(0,WS[i]-inset);
        if(wk>0.05) any=true;
        Lk.push({x:v[i].x+NX[i]*wk, y:v[i].y+NY[i]*wk});
        Rk.push({x:v[i].x-NX[i]*wk, y:v[i].y-NY[i]*wk});
      }
      if(!any) continue;
      const t=k/(DEPTH_BANDS-1);
      ctx.beginPath();
      ctx.moveTo(Lk[0].x,Lk[0].y);
      for(let i=1;i<Lk.length;i++) ctx.lineTo(Lk[i].x,Lk[i].y);
      for(let i=Rk.length-1;i>=0;i--) ctx.lineTo(Rk[i].x,Rk[i].y);
      ctx.closePath();
      ctx.fillStyle=depthBandColor(hs.h,hs.s,isDarkBg,t);
      ctx.fill();
      ctx.lineWidth=1;
      ctx.strokeStyle=isDarkBg?'rgba(0,0,0,0.18)':'rgba(255,255,255,0.35)';
      ctx.stroke();
    }
  } else {
    const L=[],R=[];
    for(let i=0;i<v.length;i++){
      L.push({x:v[i].x+NX[i]*WS[i], y:v[i].y+NY[i]*WS[i]});
      R.push({x:v[i].x-NX[i]*WS[i], y:v[i].y-NY[i]*WS[i]});
    }
    ctx.beginPath();
    ctx.moveTo(L[0].x,L[0].y);
    for(let i=1;i<L.length;i++) ctx.lineTo(L[i].x,L[i].y);
    for(let i=R.length-1;i>=0;i--) ctx.lineTo(R[i].x,R[i].y);
    ctx.closePath();
    ctx.fillStyle=color||'#191919';
    ctx.fill();
  }

  arm.branches.forEach(b=>{
    if(b.born===undefined) b.born=arm.born+80;
    const bGrow=Math.min(1,Math.max(0,(performance.now()-b.born)/280));
    // once the parent's visible stub has retracted past this branch's
    // own attachment point, the branch must close too — otherwise it'd
    // be left floating disconnected from its now-shorter parent
    const af=b.attachFrac||0;
    const branchLF = lengthFactor>=1 ? 1 : Math.max(0, Math.min(1, (lengthFactor-af)/Math.max(0.0001,1-af)));
    drawArm(b,bGrow,color,depthOn,depthMax,hs,widthScale,branchLF);
  });
}

// cheap deterministic pseudo-random in [0,1) — used so each crack's
// closing animation jolts a little differently but stays consistent
// frame to frame (no flicker) instead of using Math.random() every tick
function stepNoise(seed){
  const x=Math.sin(seed*12.9898)*43758.5453;
  return x-Math.floor(x);
}
const CLOSE_STEPS=6;

// ═══════════════════════════════════════════════════
//  ETERNAL SPAWNER — random cracks, born forever (or
//  placed by hand), each with its own lifespan: grow in
//  → hold → shrink away.
// ═══════════════════════════════════════════════════
let cracks=[],gid=0;
let nextSpawnAt=0,paused=false,depthMode=false,bgDark=false,bwMode=false;
let mode='auto'; // 'auto' | 'manual'
const MAX_CONCURRENT=6, MAX_MANUAL=14;

function spawnRandomCrack(ox,oy){
  const minDim=Math.min(W,H);
  const diag=Math.hypot(W,H);
  if(ox===undefined||oy===undefined){
    const mx=W*0.12, my=H*0.12;
    ox=mx+Math.random()*Math.max(1,W-mx*2);
    oy=my+Math.random()*Math.max(1,H-my*2);
  }

  // wide, independent spread: thin+long, thick+short, thin+short,
  // thick+long — length and thickness no longer lean on each other
  const len=diag*(0.05+Math.pow(Math.random(),1.15)*0.62);
  const baseW=minDim*(0.0055+Math.pow(Math.random(),1.4)*0.055);
  const chaos=3+Math.random()*15;
  const nb=Math.floor(Math.random()*6);
  const numArms=nb===0?1:2+Math.floor(Math.random()*2);
  const color=randomCrackColor();

  const arms=[];
  const root=Math.random()*Math.PI*2;
  for(let i=0;i<numArms;i++){
    const sp=Math.PI*2/numArms;
    const a=root+i*sp+(Math.random()-.5)*sp*.5;
    const al=len*(0.6+Math.random()*0.75);
    const aw=baseW*(0.75+Math.random()*0.45);
    arms.push(buildArm(ox,oy,a,al,aw,chaos,nb>0?2:0,nb));
  }
  const now=performance.now();
  const holdFor=4200+Math.random()*5200;
  const fadeDur=2000+Math.random()*1800;
  cracks.push({
    arms, mainArms:arms.slice(), ox, oy, born:now, color,
    holdUntil: now+900+holdFor, fadeDur, fadeBurstDone:false, lastStepIdx:-1, id:gid++
  });
  burst(ox,oy,8,4,'#999');
}

// a few small debris particles flaking off the crack while it shrinks away
function emitCrumble(g){
  const pool=g.arms.length?g.arms:null;
  if(!pool) return;
  const arm=pool[Math.floor(Math.random()*pool.length)];
  if(!arm||!arm.segs||!arm.segs.length) return;
  const idx=Math.floor(Math.random()*arm.segs.length);
  const p=arm.segs[idx];
  burst(p.x,p.y,1+Math.floor(Math.random()*2),2.4,g.color);
}

let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/1000,0.05); lastT=t;
  if(!paused){
    if(mode==='auto' && t>=nextSpawnAt && cracks.length<MAX_CONCURRENT){
      spawnRandomCrack();
      nextSpawnAt=t+1400+Math.random()*2600;
    }
    for(let i=cracks.length-1;i>=0;i--){
      const g=cracks[i];
      if(t>g.holdUntil && t<=g.holdUntil+g.fadeDur && Math.random()<0.5){
        emitCrumble(g);
      }
      if(t>g.holdUntil+g.fadeDur) cracks.splice(i,1);
    }
    tickParticles(dt);
  }
  redraw(t);
  requestAnimationFrame(loop);
}

function redraw(t){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=bgDark?'#0c0c0e':'#ffffff';
  ctx.fillRect(0,0,W,H);
  const isDarkBg=bgDark;
  const depthMax=depthMode?depthGlobalMax():1;
  for(const g of cracks){
    let lengthFactor=1, widthScale=1, alpha=1;
    if(t>g.holdUntil){
      const raw=Math.min(1,(t-g.holdUntil)/g.fadeDur);
      // quantize into a handful of sudden "snap" steps instead of one
      // smooth slide — the crack visibly jolts thinner/shorter, step by
      // step, rather than gliding away
      const stepIdx=Math.min(CLOSE_STEPS-1, Math.floor(raw*CLOSE_STEPS));
      const stepT=stepIdx/(CLOSE_STEPS-1);
      const jolt=(stepNoise(g.id*131+stepIdx)-0.5)*0.12*(1-stepT);
      const closeT=Math.min(1,Math.max(0, stepT+jolt));
      lengthFactor=1-closeT;
      widthScale=Math.max(0,1-closeT*1.25); // thins out a touch faster than it shortens
      alpha = closeT<0.85 ? 1 : Math.max(0,1-(closeT-0.85)/0.15);
      if(stepIdx!==g.lastStepIdx){
        g.lastStepIdx=stepIdx;
        emitCrumble(g); emitCrumble(g);
      }
    }
    if(alpha<=0.01 || lengthFactor<=0.004) continue;
    const[h,s,l]=hexToHsl(g.color);
    const sat = bwMode ? 0 : s;
    const flatColor=hslToHex(h,sat,isDarkBg?1-l:l);
    const hs={h,s:sat,isDarkBg};
    ctx.save();
    ctx.globalAlpha=alpha;
    drawHub(g,flatColor,depthMode,hs,depthMax,widthScale);
    g.arms.forEach(a=>{
      if(a.born===undefined) a.born=g.born;
      const ap = (t>g.holdUntil) ? lengthFactor : Math.min(1,Math.max(0,(t-a.born)/350));
      drawArm(a,ap,flatColor,depthMode,depthMax,hs,widthScale,1);
    });
    ctx.restore();
  }
  ctx.globalAlpha=1;
  drawParticles();
}

// ═══════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════
document.getElementById('btnMode').addEventListener('click',e=>{
  mode = mode==='auto' ? 'manual' : 'auto';
  e.currentTarget.textContent = mode==='auto' ? '🤖 auto' : '✋ manual';
  e.currentTarget.classList.toggle('on', mode==='manual');
  stage.classList.toggle('manual', mode==='manual');
  wrap.classList.toggle('manual', mode==='manual');
  if(mode==='auto') nextSpawnAt=performance.now()+400;
});
cv.addEventListener('click',e=>{
  if(mode!=='manual') return;
  if(cracks.length>=MAX_MANUAL) return;
  const r=cv.getBoundingClientRect();
  const x=Math.max(0,Math.min(W,e.clientX-r.left));
  const y=Math.max(0,Math.min(H,e.clientY-r.top));
  spawnRandomCrack(x,y);
});
document.getElementById('btnPause').addEventListener('click',e=>{
  paused=!paused;
  e.currentTarget.textContent=paused?'▶ play':'⏸ pause';
  e.currentTarget.classList.toggle('on',paused);
});
document.getElementById('btnDepth').addEventListener('click',e=>{
  depthMode=!depthMode;
  e.currentTarget.classList.toggle('on',depthMode);
});
document.getElementById('btnBg').addEventListener('click',e=>{
  bgDark=!bgDark;
  e.currentTarget.classList.toggle('on',bgDark);
});
document.getElementById('btnBW').addEventListener('click',e=>{
  bwMode=!bwMode;
  e.currentTarget.classList.toggle('on',bwMode);
});
document.getElementById('btnFS').addEventListener('click',()=>{
  const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
  if(!fsEl){
    const req=wrap.requestFullscreen||wrap.webkitRequestFullscreen;
    if(req) req.call(wrap);
  } else {
    const exit=document.exitFullscreen||document.webkitExitFullscreen;
    if(exit) exit.call(document);
  }
});
document.getElementById('btnSnap').addEventListener('click',()=>{
  cv.toBlob(blob=>{
    if(!blob) return;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='fracture-preview-'+Date.now()+'.jpg';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  },'image/jpeg',0.92);
});
document.getElementById('btnBack').addEventListener('click',()=>{
  paused=false;
  mode='auto';
  cracks=[]; particles=[]; chosenRatio=null;
  const modeBtn=document.getElementById('btnMode');
  modeBtn.textContent='🤖 auto'; modeBtn.classList.remove('on');
  stage.classList.remove('manual'); wrap.classList.remove('manual');
  document.getElementById('btnPause').textContent='⏸ pause';
  document.getElementById('btnPause').classList.remove('on');
  stage.style.display='none';
  document.getElementById('controls').style.display='none';
  document.getElementById('setup').style.display='flex';
});
</script>
